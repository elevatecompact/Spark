syntax = "proto3";

package spark.v1;

option go_package = "github.com/elevatecompact/spark/api/grpc/gen/go/spark/v1;sparkv1";

import "google/protobuf/timestamp.proto";
import "spark/v1/common.proto";

service GiftService {
  rpc SendGift(SendGiftRequest) returns (GiftTransaction);
  rpc GetGiftItems(GetGiftItemsRequest) returns (GetGiftItemsResponse);
  rpc PurchaseGiftItem(PurchaseGiftItemRequest) returns (GiftTransaction);
  rpc GetGiftCards(GetGiftCardsRequest) returns (GetGiftCardsResponse);
  rpc RedeemGiftCard(RedeemGiftCardRequest) returns (GiftTransaction);
  rpc GetCampaigns(GetCampaignsRequest) returns (GetCampaignsResponse);
}

message GiftItem {
  string id = 1;
  string name = 2;
  string description = 3;
  string image_url = 4;
  string animation_url = 5;
  Money price = 6;
  string category = 7;
  bool is_limited = 8;
  int64 stock = 9;
  google.protobuf.Timestamp created_at = 10;
}

message GiftTransaction {
  string id = 1;
  string from_user_id = 2;
  string to_user_id = 3;
  string stream_id = 4;
  string gift_item_id = 5;
  string gift_item_name = 6;
  int64 quantity = 7;
  Money total_amount = 8;
  string message = 9;
  bool is_anonymous = 10;
  google.protobuf.Timestamp created_at = 11;
}

message GiftCard {
  string id = 1;
  string sender_id = 2;
  string code = 3;
  Money amount = 4;
  Money remaining = 5;
  string status = 6;
  string recipient_email = 7;
  string message = 8;
  google.protobuf.Timestamp expires_at = 9;
  google.protobuf.Timestamp created_at = 10;
}

message Campaign {
  string id = 1;
  string creator_id = 2;
  string name = 3;
  string description = 4;
  string gift_item_id = 5;
  int64 goal_quantity = 6;
  int64 current_quantity = 7;
  string reward = 8;
  google.protobuf.Timestamp starts_at = 9;
  google.protobuf.Timestamp ends_at = 10;
  bool is_active = 11;
}

message SendGiftRequest {
  string from_user_id = 1;
  string to_user_id = 2;
  string stream_id = 3;
  string gift_item_id = 4;
  int64 quantity = 5;
  string message = 6;
  bool is_anonymous = 7;
}

message GetGiftItemsRequest {
  string category = 1;
  bool include_limited = 2;
}

message GetGiftItemsResponse {
  repeated GiftItem items = 1;
}

message PurchaseGiftItemRequest {
  string user_id = 1;
  string gift_item_id = 2;
  int64 quantity = 3;
  string payment_method_id = 4;
}

message GetGiftCardsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetGiftCardsResponse {
  repeated GiftCard cards = 1;
  Pagination pagination = 2;
}

message RedeemGiftCardRequest {
  string code = 1;
  string user_id = 2;
}

message GetCampaignsRequest {
  string creator_id = 1;
  bool active_only = 2;
}

message GetCampaignsResponse {
  repeated Campaign campaigns = 1;
}
