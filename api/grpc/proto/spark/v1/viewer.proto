syntax = "proto3";

package spark.v1;

option go_package = "github.com/elevatecompact/spark/api/grpc/gen/go/spark/v1;sparkv1";

import "google/protobuf/timestamp.proto";
import "spark/v1/common.proto";

service ViewerService {
  rpc Follow(FollowRequest) returns (FollowResponse);
  rpc Unfollow(UnfollowRequest) returns (Empty);
  rpc GetFollowers(GetFollowersRequest) returns (GetFollowersResponse);
  rpc GetFollowing(GetFollowingRequest) returns (GetFollowingResponse);
  rpc GetViewerHistory(GetViewerHistoryRequest) returns (GetViewerHistoryResponse);
  rpc RecordView(RecordViewRequest) returns (Empty);
  rpc GetWatchTime(GetWatchTimeRequest) returns (GetWatchTimeResponse);
}

message FollowRequest {
  string user_id = 1;
  string creator_id = 2;
}

message FollowResponse {
  bool following = 1;
  int64 follower_count = 2;
}

message UnfollowRequest {
  string user_id = 1;
  string creator_id = 2;
}

message Follower {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
  string avatar_url = 4;
  google.protobuf.Timestamp followed_at = 5;
}

message GetFollowersRequest {
  string creator_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetFollowersResponse {
  repeated Follower followers = 1;
  Pagination pagination = 2;
}

message Following {
  string creator_id = 1;
  string username = 2;
  string display_name = 3;
  string avatar_url = 4;
  bool is_live = 5;
  google.protobuf.Timestamp followed_at = 6;
}

message GetFollowingRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetFollowingResponse {
  repeated Following following = 1;
  Pagination pagination = 2;
}

message ViewHistoryEntry {
  string stream_id = 1;
  string creator_id = 2;
  string creator_username = 3;
  string title = 4;
  string thumbnail_url = 5;
  int64 watch_duration = 6;
  google.protobuf.Timestamp watched_at = 7;
}

message GetViewerHistoryRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetViewerHistoryResponse {
  repeated ViewHistoryEntry entries = 1;
  Pagination pagination = 2;
}

message RecordViewRequest {
  string stream_id = 1;
  string user_id = 2;
  int64 watch_duration = 3;
}

message GetWatchTimeRequest {
  string user_id = 1;
  string creator_id = 2;
  DateRange range = 3;
}

message GetWatchTimeResponse {
  int64 total_minutes = 1;
  int64 stream_count = 2;
}
