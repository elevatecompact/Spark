syntax = "proto3";

package spark.v1;

option go_package = "github.com/elevatecompact/spark/api/grpc/gen/go/spark/v1;sparkv1";

import "google/protobuf/timestamp.proto";
import "spark/v1/common.proto";

service WalletService {
  rpc GetBalance(GetBalanceRequest) returns (Balance);
  rpc Deposit(DepositRequest) returns (Transaction);
  rpc Withdraw(WithdrawRequest) returns (Transaction);
  rpc Transfer(TransferRequest) returns (Transaction);
  rpc GetTransactions(GetTransactionsRequest) returns (GetTransactionsResponse);
  rpc GetTransaction(GetTransactionRequest) returns (Transaction);
  rpc GetPayoutMethods(GetPayoutMethodsRequest) returns (GetPayoutMethodsResponse);
  rpc AddPayoutMethod(AddPayoutMethodRequest) returns (PayoutMethod);
  rpc RemovePayoutMethod(RemovePayoutMethodRequest) returns (Empty);
}

message Balance {
  string user_id = 1;
  int64 available = 2;
  int64 pending = 3;
  int64 total_earned = 4;
  int64 total_withdrawn = 5;
  string currency = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message GetBalanceRequest {
  string user_id = 1;
}

message Transaction {
  string id = 1;
  string user_id = 2;
  string type = 3;
  string status = 4;
  Money amount = 5;
  Money fee = 6;
  string description = 7;
  string reference_type = 8;
  string reference_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp completed_at = 11;
}

message DepositRequest {
  string user_id = 1;
  Money amount = 2;
  string payment_method_id = 3;
}

message WithdrawRequest {
  string user_id = 1;
  Money amount = 2;
  string payout_method_id = 3;
}

message TransferRequest {
  string from_user_id = 1;
  string to_user_id = 2;
  Money amount = 3;
  string description = 4;
}

message GetTransactionsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string type = 4;
  string status = 5;
  DateRange range = 6;
}

message GetTransactionsResponse {
  repeated Transaction transactions = 1;
  Pagination pagination = 2;
}

message GetTransactionRequest {
  string transaction_id = 1;
}

message PayoutMethod {
  string id = 1;
  string user_id = 2;
  string type = 3;
  string label = 4;
  bool is_default = 5;
  google.protobuf.Timestamp created_at = 6;
}

message GetPayoutMethodsRequest {
  string user_id = 1;
}

message GetPayoutMethodsResponse {
  repeated PayoutMethod methods = 1;
}

message AddPayoutMethodRequest {
  string user_id = 1;
  string type = 2;
  string label = 3;
  map<string, string> details = 4;
}

message RemovePayoutMethodRequest {
  string payout_method_id = 1;
}
