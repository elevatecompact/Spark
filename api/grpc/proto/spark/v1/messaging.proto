syntax = "proto3";

package spark.v1;

option go_package = "github.com/elevatecompact/spark/api/grpc/gen/go/spark/v1;sparkv1";

import "google/protobuf/timestamp.proto";
import "spark/v1/common.proto";

service MessagingService {
  rpc SendMessage(SendDirectMessageRequest) returns (DirectMessage);
  rpc GetConversation(GetConversationRequest) returns (GetConversationResponse);
  rpc GetConversations(GetConversationsRequest) returns (GetConversationsResponse);
  rpc MarkRead(MarkReadRequest) returns (Empty);
  rpc DeleteMessage(DeleteDirectMessageRequest) returns (Empty);
  rpc GetUnreadCount(GetUnreadCountRequest) returns (UnreadCount);
}

message DirectMessage {
  string id = 1;
  string conversation_id = 2;
  string sender_id = 3;
  string sender_username = 4;
  string content = 5;
  google.protobuf.Timestamp created_at = 6;
  bool is_read = 7;
}

message Conversation {
  string id = 1;
  repeated string participant_ids = 2;
  DirectMessage last_message = 3;
  int64 unread_count = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message SendDirectMessageRequest {
  string sender_id = 1;
  string receiver_id = 2;
  string content = 3;
}

message GetConversationRequest {
  string conversation_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetConversationResponse {
  Conversation conversation = 1;
  repeated DirectMessage messages = 2;
  Pagination pagination = 3;
}

message GetConversationsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetConversationsResponse {
  repeated Conversation conversations = 1;
  Pagination pagination = 2;
}

message MarkReadRequest {
  string conversation_id = 1;
  string user_id = 2;
}

message DeleteDirectMessageRequest {
  string message_id = 1;
  string user_id = 2;
}

message GetUnreadCountRequest {
  string user_id = 1;
}

message UnreadCount {
  int64 total = 1;
  map<string, int64> per_conversation = 2;
}
