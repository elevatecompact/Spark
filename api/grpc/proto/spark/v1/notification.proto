syntax = "proto3";

package spark.v1;

option go_package = "github.com/elevatecompact/spark/api/grpc/gen/go/spark/v1;sparkv1";

import "google/protobuf/timestamp.proto";
import "spark/v1/common.proto";

service NotificationService {
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkRead(MarkNotificationReadRequest) returns (Empty);
  rpc MarkAllRead(MarkAllNotificationsReadRequest) returns (Empty);
  rpc GetPreferences(GetPreferencesRequest) returns (NotificationPreferences);
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (NotificationPreferences);
  rpc RegisterDevice(RegisterDeviceRequest) returns (Device);
  rpc UnregisterDevice(UnregisterDeviceRequest) returns (Empty);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc GetTemplates(GetTemplatesRequest) returns (GetTemplatesResponse);
  rpc CreateTemplate(CreateTemplateRequest) returns (NotificationTemplate);
  rpc UpdateTemplate(UpdateTemplateRequest) returns (NotificationTemplate);
  rpc GetUnreadCount(GetUnreadCountRequest) returns (UnreadCount);
}

message Notification {
  string id = 1;
  string user_id = 2;
  string type = 3;
  string title = 4;
  string body = 5;
  string image_url = 6;
  string action_url = 7;
  map<string, string> data = 8;
  bool is_read = 9;
  google.protobuf.Timestamp created_at = 10;
}

message ListNotificationsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  bool unread_only = 4;
  string type = 5;
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
  Pagination pagination = 2;
}

message MarkNotificationReadRequest {
  string notification_id = 1;
}

message MarkAllNotificationsReadRequest {
  string user_id = 1;
}

message NotificationPreferences {
  string user_id = 1;
  bool push_enabled = 2;
  bool email_enabled = 3;
  bool sms_enabled = 4;
  map<string, bool> channel_preferences = 5;
  map<string, bool> type_preferences = 6;
  string digest_frequency = 7;
  bool do_not_disturb = 8;
  string dnd_start = 9;
  string dnd_end = 10;
}

message GetPreferencesRequest {
  string user_id = 1;
}

message UpdatePreferencesRequest {
  string user_id = 1;
  NotificationPreferences preferences = 2;
}

message Device {
  string id = 1;
  string user_id = 2;
  string token = 3;
  string platform = 4;
  string device_name = 5;
  bool is_active = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message RegisterDeviceRequest {
  string user_id = 1;
  string token = 2;
  string platform = 3;
  string device_name = 4;
}

message UnregisterDeviceRequest {
  string device_id = 1;
}

message ListDevicesRequest {
  string user_id = 1;
}

message ListDevicesResponse {
  repeated Device devices = 1;
}

message NotificationTemplate {
  string id = 1;
  string name = 2;
  string type = 3;
  string title_template = 4;
  string body_template = 5;
  map<string, string> channels = 6;
  bool is_active = 7;
  google.protobuf.Timestamp created_at = 8;
}

message GetTemplatesRequest {}
message GetTemplatesResponse {
  repeated NotificationTemplate templates = 1;
}

message CreateTemplateRequest {
  string name = 1;
  string type = 2;
  string title_template = 3;
  string body_template = 4;
  map<string, string> channels = 5;
}

message UpdateTemplateRequest {
  string template_id = 1;
  string name = 2;
  string title_template = 3;
  string body_template = 4;
  map<string, string> channels = 5;
  bool is_active = 6;
}

message GetUnreadCountRequest {
  string user_id = 1;
}

message UnreadCount {
  int64 total = 1;
}
