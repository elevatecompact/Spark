syntax = "proto3";

package spark.v1;

option go_package = "github.com/elevatecompact/spark/api/grpc/gen/go/spark/v1;sparkv1";

import "google/protobuf/timestamp.proto";
import "spark/v1/common.proto";

service EventService {
  rpc CreateEvent(CreateEventRequest) returns (Event);
  rpc GetEvent(GetEventRequest) returns (Event);
  rpc UpdateEvent(UpdateEventRequest) returns (Event);
  rpc DeleteEvent(DeleteEventRequest) returns (Empty);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc RSVP(RSVPRequest) returns (Attendee);
  rpc CancelRSVP(CancelRSVPRequest) returns (Empty);
  rpc GetAttendees(GetAttendeesRequest) returns (GetAttendeesResponse);
  rpc PurchaseTicket(PurchaseTicketRequest) returns (Ticket);
  rpc GetTickets(GetTicketsRequest) returns (GetTicketsResponse);
  rpc CreateSession(CreateSessionRequest) returns (Session);
  rpc GetSessions(GetSessionsRequest) returns (GetSessionsResponse);
  rpc CreateSeries(CreateSeriesRequest) returns (EventSeries);
  rpc GetSeries(GetSeriesRequest) returns (EventSeries);
  rpc ListSeries(ListSeriesRequest) returns (ListSeriesResponse);
}

message Event {
  string id = 1;
  string creator_id = 2;
  string title = 3;
  string description = 4;
  string type = 5;
  string status = 6;
  string category = 7;
  string thumbnail_url = 8;
  string banner_url = 9;
  string venue_name = 10;
  Address venue_address = 11;
  string online_url = 12;
  google.protobuf.Timestamp start_date = 13;
  google.protobuf.Timestamp end_date = 14;
  string timezone = 15;
  int64 max_attendees = 16;
  int64 attendee_count = 17;
  bool is_featured = 18;
  repeated string tags = 19;
  google.protobuf.Timestamp created_at = 20;
  google.protobuf.Timestamp updated_at = 21;
}

message CreateEventRequest {
  string creator_id = 1;
  string title = 2;
  string description = 3;
  string type = 4;
  string category = 5;
  string thumbnail_url = 6;
  string banner_url = 7;
  string venue_name = 8;
  Address venue_address = 9;
  string online_url = 10;
  google.protobuf.Timestamp start_date = 11;
  google.protobuf.Timestamp end_date = 12;
  string timezone = 13;
  int64 max_attendees = 14;
  repeated string tags = 15;
}

message GetEventRequest {
  string event_id = 1;
}

message UpdateEventRequest {
  string event_id = 1;
  string title = 2;
  string description = 3;
  string category = 4;
  string thumbnail_url = 5;
  string banner_url = 6;
  string venue_name = 7;
  Address venue_address = 8;
  string online_url = 9;
  google.protobuf.Timestamp start_date = 10;
  google.protobuf.Timestamp end_date = 11;
  string timezone = 12;
  int64 max_attendees = 13;
  repeated string tags = 14;
}

message DeleteEventRequest {
  string event_id = 1;
}

message ListEventsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string creator_id = 3;
  string category = 4;
  string status = 5;
  string type = 6;
  DateRange date_range = 7;
  string search = 8;
}

message ListEventsResponse {
  repeated Event events = 1;
  Pagination pagination = 2;
}

message Attendee {
  string id = 1;
  string event_id = 2;
  string user_id = 3;
  string username = 4;
  string status = 5;
  google.protobuf.Timestamp rsvp_at = 6;
}

message RSVPRequest {
  string event_id = 1;
  string user_id = 2;
  string status = 3;
}

message CancelRSVPRequest {
  string event_id = 1;
  string user_id = 2;
}

message GetAttendeesRequest {
  string event_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetAttendeesResponse {
  repeated Attendee attendees = 1;
  Pagination pagination = 2;
}

message TicketTier {
  string id = 1;
  string event_id = 2;
  string name = 3;
  string description = 4;
  Money price = 5;
  int64 quantity = 6;
  int64 sold = 7;
  google.protobuf.Timestamp sales_start = 8;
  google.protobuf.Timestamp sales_end = 9;
}

message Ticket {
  string id = 1;
  string event_id = 2;
  string tier_id = 3;
  string user_id = 4;
  string code = 5;
  string status = 6;
  string payment_intent_id = 7;
  google.protobuf.Timestamp created_at = 8;
}

message PurchaseTicketRequest {
  string event_id = 1;
  string tier_id = 2;
  string user_id = 3;
  int64 quantity = 4;
}

message GetTicketsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetTicketsResponse {
  repeated Ticket tickets = 1;
  Pagination pagination = 2;
}

message Session {
  string id = 1;
  string event_id = 2;
  string title = 3;
  string description = 4;
  string speaker_id = 5;
  string speaker_name = 6;
  google.protobuf.Timestamp start_time = 7;
  google.protobuf.Timestamp end_time = 8;
  string room = 9;
  string stream_url = 10;
}

message CreateSessionRequest {
  string event_id = 1;
  string title = 2;
  string description = 3;
  string speaker_id = 4;
  string speaker_name = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
  string room = 8;
  string stream_url = 9;
}

message GetSessionsRequest {
  string event_id = 1;
}

message GetSessionsResponse {
  repeated Session sessions = 1;
}

message EventSeries {
  string id = 1;
  string creator_id = 2;
  string title = 3;
  string description = 4;
  string frequency = 5;
  int32 interval_count = 6;
  repeated string days_of_week = 7;
  google.protobuf.Timestamp start_date = 8;
  google.protobuf.Timestamp end_date = 9;
  google.protobuf.Timestamp next_event_date = 10;
  google.protobuf.Timestamp created_at = 11;
}

message CreateSeriesRequest {
  string creator_id = 1;
  string title = 2;
  string description = 3;
  string frequency = 4;
  int32 interval_count = 5;
  repeated string days_of_week = 6;
  google.protobuf.Timestamp start_date = 7;
  google.protobuf.Timestamp end_date = 8;
}

message GetSeriesRequest {
  string series_id = 1;
}

message ListSeriesRequest {
  string creator_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListSeriesResponse {
  repeated EventSeries series = 1;
  Pagination pagination = 2;
}
