syntax = "proto3";

package spark.v1;

option go_package = "github.com/elevatecompact/spark/api/grpc/gen/go/spark/v1;sparkv1";

import "google/protobuf/timestamp.proto";
import "spark/v1/common.proto";

service SubscriptionService {
  rpc Subscribe(SubscribeRequest) returns (Subscription);
  rpc CancelSubscription(CancelSubscriptionRequest) returns (Subscription);
  rpc GetSubscription(GetSubscriptionRequest) returns (Subscription);
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse);
  rpc ListSubscribers(ListSubscribersRequest) returns (ListSubscribersResponse);
  rpc GetPlans(GetPlansRequest) returns (GetPlansResponse);
  rpc CreatePlan(CreatePlanRequest) returns (Plan);
  rpc UpdatePlan(UpdatePlanRequest) returns (Plan);
  rpc GetInvoices(GetInvoicesRequest) returns (GetInvoicesResponse);
}

message Plan {
  string id = 1;
  string creator_id = 2;
  string name = 3;
  string description = 4;
  Money price = 5;
  string interval = 6;
  repeated string benefits = 7;
  bool is_active = 8;
  int64 subscriber_count = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message Subscription {
  string id = 1;
  string user_id = 2;
  string creator_id = 3;
  string plan_id = 4;
  string status = 5;
  google.protobuf.Timestamp current_period_start = 6;
  google.protobuf.Timestamp current_period_end = 7;
  bool cancel_at_period_end = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message Invoice {
  string id = 1;
  string subscription_id = 2;
  string user_id = 3;
  string status = 4;
  Money amount = 5;
  google.protobuf.Timestamp due_date = 6;
  google.protobuf.Timestamp paid_at = 7;
  google.protobuf.Timestamp created_at = 8;
}

message SubscribeRequest {
  string user_id = 1;
  string plan_id = 2;
  string payment_method_id = 3;
}

message CancelSubscriptionRequest {
  string subscription_id = 1;
  bool cancel_at_period_end = 2;
}

message GetSubscriptionRequest {
  string subscription_id = 1;
}

message ListSubscriptionsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListSubscriptionsResponse {
  repeated Subscription subscriptions = 1;
  Pagination pagination = 2;
}

message ListSubscribersRequest {
  string creator_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListSubscribersResponse {
  repeated Subscription subscribers = 1;
  Pagination pagination = 2;
}

message GetPlansRequest {
  string creator_id = 1;
  bool include_inactive = 2;
}

message GetPlansResponse {
  repeated Plan plans = 1;
}

message CreatePlanRequest {
  string creator_id = 1;
  string name = 2;
  string description = 3;
  Money price = 4;
  string interval = 5;
  repeated string benefits = 6;
}

message UpdatePlanRequest {
  string plan_id = 1;
  string name = 2;
  string description = 3;
  Money price = 4;
  string interval = 5;
  repeated string benefits = 6;
  bool is_active = 7;
}

message GetInvoicesRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetInvoicesResponse {
  repeated Invoice invoices = 1;
  Pagination pagination = 2;
}
