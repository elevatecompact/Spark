syntax = "proto3";

package spark.v1;

option go_package = "github.com/elevatecompact/spark/api/grpc/gen/go/spark/v1;sparkv1";

import "google/protobuf/timestamp.proto";
import "spark/v1/common.proto";

service SearchService {
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Autocomplete(AutocompleteRequest) returns (AutocompleteResponse);
  rpc GetSuggestions(GetSuggestionsRequest) returns (GetSuggestionsResponse);
  rpc GetSynonyms(GetSynonymsRequest) returns (GetSynonymsResponse);
  rpc CreateSynonym(CreateSynonymRequest) returns (Synonym);
  rpc DeleteSynonym(DeleteSynonymRequest) returns (Empty);
}

message SearchRequest {
  string query = 1;
  string type = 2;
  int32 page = 3;
  int32 page_size = 4;
  string category = 5;
  repeated string tags = 6;
  string sort = 7;
  string language = 8;
  bool is_live = 9;
}

message SearchResult {
  string id = 1;
  string type = 2;
  string title = 3;
  string description = 4;
  string thumbnail_url = 5;
  string creator_id = 6;
  string creator_username = 7;
  string creator_avatar = 8;
  double score = 9;
  map<string, string> highlights = 10;
}

message SearchResponse {
  repeated SearchResult results = 1;
  Pagination pagination = 2;
  map<string, int64> facet_counts = 3;
  repeated string suggestions = 4;
}

message AutocompleteRequest {
  string prefix = 1;
  string type = 2;
  int32 limit = 3;
}

message AutocompleteResponse {
  repeated string suggestions = 1;
  repeated SearchResult top_results = 2;
}

message GetSuggestionsRequest {
  string user_id = 1;
  int32 limit = 2;
}

message GetSuggestionsResponse {
  repeated string suggestions = 1;
}

message Synonym {
  string id = 1;
  string term = 2;
  repeated string synonyms = 3;
  string locale = 4;
  google.protobuf.Timestamp created_at = 5;
}

message GetSynonymsRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message GetSynonymsResponse {
  repeated Synonym synonyms = 1;
  Pagination pagination = 2;
}

message CreateSynonymRequest {
  string term = 1;
  repeated string synonyms = 2;
  string locale = 3;
}

message DeleteSynonymRequest {
  string synonym_id = 1;
}
