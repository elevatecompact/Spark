syntax = "proto3";

package spark.v1;

option go_package = "github.com/elevatecompact/spark/api/grpc/gen/go/spark/v1;sparkv1";

import "google/protobuf/timestamp.proto";
import "spark/v1/common.proto";

service CommunityService {
  rpc CreateCommunity(CreateCommunityRequest) returns (Community);
  rpc GetCommunity(GetCommunityRequest) returns (Community);
  rpc UpdateCommunity(UpdateCommunityRequest) returns (Community);
  rpc DeleteCommunity(DeleteCommunityRequest) returns (Empty);
  rpc ListCommunities(ListCommunitiesRequest) returns (ListCommunitiesResponse);
  rpc JoinCommunity(JoinCommunityRequest) returns (Membership);
  rpc LeaveCommunity(LeaveCommunityRequest) returns (Empty);
  rpc GetMembers(GetMembersRequest) returns (GetMembersResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (Membership);
  rpc CreatePost(CreatePostRequest) returns (Post);
  rpc GetPost(GetPostRequest) returns (Post);
  rpc UpdatePost(UpdatePostRequest) returns (Post);
  rpc DeletePost(DeletePostRequest) returns (Empty);
  rpc ListPosts(ListPostsRequest) returns (ListPostsResponse);
  rpc CreateComment(CreateCommentRequest) returns (Comment);
  rpc DeleteComment(DeleteCommentRequest) returns (Empty);
  rpc GetComments(GetCommentsRequest) returns (GetCommentsResponse);
  rpc ReactToPost(ReactToPostRequest) returns (Reaction);
  rpc RemoveReaction(RemoveReactionRequest) returns (Empty);
}

message Community {
  string id = 1;
  string name = 2;
  string description = 3;
  string avatar_url = 4;
  string banner_url = 5;
  string owner_id = 6;
  bool is_private = 7;
  bool is_verified = 8;
  repeated string categories = 9;
  repeated string rules = 10;
  int64 member_count = 11;
  int64 post_count = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message CreateCommunityRequest {
  string name = 1;
  string description = 2;
  string owner_id = 3;
  bool is_private = 4;
  repeated string categories = 5;
  repeated string rules = 6;
}

message GetCommunityRequest {
  string community_id = 1;
}

message UpdateCommunityRequest {
  string community_id = 1;
  string description = 2;
  string avatar_url = 3;
  string banner_url = 4;
  bool is_private = 5;
  repeated string categories = 6;
  repeated string rules = 7;
}

message DeleteCommunityRequest {
  string community_id = 1;
}

message ListCommunitiesRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
  string category = 4;
}

message ListCommunitiesResponse {
  repeated Community communities = 1;
  Pagination pagination = 2;
}

message Membership {
  string id = 1;
  string community_id = 2;
  string user_id = 3;
  string username = 4;
  string role = 5;
  google.protobuf.Timestamp joined_at = 6;
}

message JoinCommunityRequest {
  string community_id = 1;
  string user_id = 2;
}

message LeaveCommunityRequest {
  string community_id = 1;
  string user_id = 2;
}

message GetMembersRequest {
  string community_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string role = 4;
}

message GetMembersResponse {
  repeated Membership members = 1;
  Pagination pagination = 2;
}

message UpdateMemberRoleRequest {
  string community_id = 1;
  string user_id = 2;
  string new_role = 3;
}

message Post {
  string id = 1;
  string community_id = 2;
  string author_id = 3;
  string author_username = 4;
  string author_avatar = 5;
  string title = 6;
  string content = 7;
  string type = 8;
  repeated string media_urls = 9;
  bool is_pinned = 10;
  bool is_announcement = 11;
  int64 comment_count = 12;
  int64 reaction_count = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

message CreatePostRequest {
  string community_id = 1;
  string author_id = 2;
  string title = 3;
  string content = 4;
  string type = 5;
  repeated string media_urls = 6;
  bool is_announcement = 7;
}

message GetPostRequest {
  string post_id = 1;
}

message UpdatePostRequest {
  string post_id = 1;
  string title = 2;
  string content = 3;
  repeated string media_urls = 4;
  bool is_pinned = 5;
}

message DeletePostRequest {
  string post_id = 1;
}

message ListPostsRequest {
  string community_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  bool pinned_only = 4;
  string sort = 5;
}

message ListPostsResponse {
  repeated Post posts = 1;
  Pagination pagination = 2;
}

message Comment {
  string id = 1;
  string post_id = 2;
  string parent_id = 3;
  string author_id = 4;
  string author_username = 5;
  string content = 6;
  int64 depth = 7;
  google.protobuf.Timestamp created_at = 8;
}

message CreateCommentRequest {
  string post_id = 1;
  string parent_id = 2;
  string author_id = 3;
  string content = 4;
}

message DeleteCommentRequest {
  string comment_id = 1;
}

message GetCommentsRequest {
  string post_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string sort = 4;
}

message GetCommentsResponse {
  repeated Comment comments = 1;
  Pagination pagination = 2;
}

message Reaction {
  string id = 1;
  string post_id = 2;
  string user_id = 3;
  string type = 4;
  google.protobuf.Timestamp created_at = 5;
}

message ReactToPostRequest {
  string post_id = 1;
  string user_id = 2;
  string type = 3;
}

message RemoveReactionRequest {
  string post_id = 1;
  string user_id = 2;
}
