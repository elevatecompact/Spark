version: v2
managed:
  enabled: true
  optimize_for: SPEED
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-es
    out: gen/es
    opt: target=ts
  - local: protoc-gen-connect-es
    out: gen/es
    opt: target=ts
