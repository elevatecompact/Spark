apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-config
  namespace: spark
data:
  SPARK_ENVIRONMENT: "production"
  POSTGRES_HOST: "postgres.spark.svc.cluster.local"
  POSTGRES_PORT: "5432"
  REDIS_HOST: "redis.spark.svc.cluster.local"
  REDIS_PORT: "6379"
  KAFKA_BROKERS: "kafka.spark.svc.cluster.local:9092"
  OPENSEARCH_HOST: "opensearch.spark.svc.cluster.local"
  OPENSEARCH_PORT: "9200"
  LOG_LEVEL: "info"
