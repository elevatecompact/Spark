apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: spark
  labels:
    app: media-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: ghcr.io/elevatecompact/media-service:latest
          ports:
            - containerPort: 4018
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/spark_media?sslmode=disable"
            - name: REDIS_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: spark-config
                  key: KAFKA_BROKERS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: spark-config
                  key: LOG_LEVEL
          envFrom:
            - secretRef:
                name: spark-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 4018
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 4018
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "400m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: spark
spec:
  ports:
    - name: http
      port: 4018
      targetPort: 4018
  selector:
    app: media-service
