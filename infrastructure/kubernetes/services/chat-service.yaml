apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: spark
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: spark/chat-service:latest
          ports:
            - containerPort: 4005
            - containerPort: 4006
            - containerPort: 9105
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/spark_chat?sslmode=disable"
            - name: REDIS_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: spark-config
                  key: KAFKA_BROKERS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: spark-config
                  key: LOG_LEVEL
          livenessProbe:
            httpGet:
              path: /health
              port: 4005
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: spark
spec:
  ports:
    - name: http
      port: 4005
    - name: ws
      port: 4006
    - name: grpc
      port: 9105
  selector:
    app: chat-service
