apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-service
  namespace: spark
  labels:
    app: stream-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stream-service
  template:
    metadata:
      labels:
        app: stream-service
    spec:
      containers:
        - name: stream-service
          image: ghcr.io/elevatecompact/stream-service:latest
          ports:
            - containerPort: 4025
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/spark_stream?sslmode=disable"
            - name: REDIS_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: spark-config
                  key: KAFKA_BROKERS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: spark-config
                  key: LOG_LEVEL
          envFrom:
            - secretRef:
                name: spark-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 4025
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 4025
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: stream-service
  namespace: spark
spec:
  ports:
    - name: http
      port: 4025
      targetPort: 4025
  selector:
    app: stream-service
