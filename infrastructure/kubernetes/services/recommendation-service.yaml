apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: spark
  labels:
    app: recommendation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
        - name: recommendation-service
          image: ghcr.io/elevatecompact/recommendation-service:latest
          ports:
            - containerPort: 4023
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/spark_recommendation?sslmode=disable"
            - name: REDIS_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: spark-config
                  key: KAFKA_BROKERS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: spark-config
                  key: LOG_LEVEL
          envFrom:
            - secretRef:
                name: spark-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 4023
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 4023
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "400m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: spark
spec:
  ports:
    - name: http
      port: 4023
      targetPort: 4023
  selector:
    app: recommendation-service
