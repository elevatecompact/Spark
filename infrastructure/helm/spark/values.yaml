global:
  environment: production
  imageRegistry: ghcr.io/elevatecompact

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

postgres:
  enabled: true
  image: postgres:16-alpine
  storageSize: 50Gi
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

redis:
  enabled: true
  image: redis:7-alpine
  storageSize: 10Gi

kafka:
  enabled: true
  image: confluentinc/cp-kafka:7.6.0
  storageSize: 20Gi
  replicas: 3

services:
  identity:
    enabled: true
    replicas: 3
    image: spark/identity-service
    tag: latest
    port: 8080
    grpcPort: 9090
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  stream:
    enabled: true
    replicas: 3
    image: spark/stream-service
    tag: latest
    port: 8081
    rtmpPort: 1935
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

  chat:
    enabled: true
    replicas: 3
    image: spark/chat-service
    tag: latest
    port: 4005
    wsPort: 4006
    grpcPort: 9105
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  viewer:
    enabled: true
    replicas: 2
    image: spark/viewer-service
    tag: latest
    port: 4003

  wallet:
    enabled: true
    replicas: 2
    image: spark/wallet-service
    tag: latest
    port: 4009

  messaging:
    enabled: true
    replicas: 2
    image: spark/messaging-service
    tag: latest
    port: 4007
    wsPort: 4008

  subscription:
    enabled: true
    replicas: 2
    image: spark/subscription-service
    tag: latest
    port: 4010

  payment:
    enabled: true
    replicas: 2
    image: spark/payment-service
    tag: latest
    port: 4012

  notification:
    enabled: true
    replicas: 2
    image: spark/notification-service
    tag: latest
    port: 4014

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.spark.dev
      paths:
        - path: /api
          pathType: Prefix
          service: identity-service
          port: 8080
  tls:
    - secretName: spark-api-tls
      hosts:
        - api.spark.dev

secrets:
  postgresUser: spark
  postgresPassword: ""  # Must be set via --set or external secret
  jwtSecret: ""         # Must be set via --set or external secret
