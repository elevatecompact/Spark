{{- $fullname := include "spark.fullname" . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-%s" $fullname $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "spark.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      {{- include "spark.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "spark.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: {{ $svc.image }}:{{ $svc.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ $svc.port }}
              name: http
            {{- if $svc.grpcPort }}
            - containerPort: {{ $svc.grpcPort }}
              name: grpc
            {{- end }}
            {{- if $svc.wsPort }}
            - containerPort: {{ $svc.wsPort }}
              name: ws
            {{- end }}
            {{- if $svc.rtmpPort }}
            - containerPort: {{ $svc.rtmpPort }}
              name: rtmp
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ printf "%s-config" $fullname }}
            - secretRef:
                name: {{ printf "%s-secrets" $fullname }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ $svc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
---
{{- end }}
{{- end }}
