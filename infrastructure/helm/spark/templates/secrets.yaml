apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-secrets" (include "spark.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spark.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.postgresUser }}
  POSTGRES_USER: {{ .Values.secrets.postgresUser | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.postgresPassword }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- end }}
