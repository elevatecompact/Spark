{{- $fullname := include "spark.fullname" . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-%s" $fullname $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "spark.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
      protocol: TCP
    {{- if $svc.grpcPort }}
    - name: grpc
      port: {{ $svc.grpcPort }}
      targetPort: {{ $svc.grpcPort }}
      protocol: TCP
    {{- end }}
    {{- if $svc.wsPort }}
    - name: ws
      port: {{ $svc.wsPort }}
      targetPort: {{ $svc.wsPort }}
      protocol: TCP
    {{- end }}
    {{- if $svc.rtmpPort }}
    - name: rtmp
      port: {{ $svc.rtmpPort }}
      targetPort: {{ $svc.rtmpPort }}
      protocol: TCP
    {{- end }}
  selector:
    {{- include "spark.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
---
{{- end }}
{{- end }}
