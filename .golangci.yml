run:
  timeout: 10m
  modules-download-mode: readonly
  issues-exit-code: 1
  tests: true
  allow-parallel-runners: true

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - revive
    - gosec
    - ineffassign
    - typecheck
    - unused
    - gofmt
    - goimports
    - whitespace
    - misspell
    - goconst
    - gocyclo
    - nakedret
    - prealloc
    - unconvert
    - unparam
    - decorder
    - gocritic
    - bodyclose
    - noctx
    - nilerr
    - nosprintfhostport
  disable:
    - exhaustruct
    - wrapcheck
    - wsl
    - nlreturn
    - goerr113
    - dupl
    - lll
  fast: false

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
    check-shadowing: true

  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (*net/http.Server).Shutdown
      - io.Copy
      - io.WriteString

  staticcheck:
    checks:
      - all
      - -SA1019
      - -SA2002

  gocyclo:
    min-complexity: 15

  misspell:
    locale: US

  goconst:
    min-len: 3
    min-occurrences: 3

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - whyNoLint
      - wrapperFunc
      - ifElseChain

  gosec:
    excludes:
      - G301
      - G307
      - G204

  goimports:
    local-prefixes: github.com/elevatecompact/spark

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - gosec
        - goconst
        - noctx
        - bodyclose

    - path: cmd/
      linters:
        - gosec

  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor
    - node_modules
    - target
    - dist
    - .git
    - .github
