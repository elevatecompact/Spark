# ============================================================================
# Spark - Development Docker Compose
# ============================================================================
# Usage:
#   Start all services:    docker compose -f deployment/development/docker-compose.yml up -d
#   Start a subset:        docker compose -f deployment/development/docker-compose.yml up -d identity-service postgres redis
#   Rebuild a service:     docker compose -f deployment/development/docker-compose.yml build identity-service
#   Follow logs:           docker compose -f deployment/development/docker-compose.yml logs -f
# ============================================================================

services:
  # ===========================================================================
  # Infrastructure
  # ===========================================================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spark
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: true
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"

  # ===========================================================================
  # Go Microservices (25)
  # ===========================================================================
  # All Go services use the root multi-stage Dockerfile with SERVICE build arg.
  # They share postgres, redis, kafka infrastructure.
  # ===========================================================================

  identity-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: services/identity-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPARK_ENVIRONMENT: development
      SERVER_PORT: "8080"
      GRPC_PORT: "9090"
      DATABASE_URL: postgres://spark:spark_dev@postgres:5432/spark?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: spark-dev-jwt-secret-do-not-use-in-production
      JWT_EXPIRY: 24h
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
      - "9090:9090"

  creator-service:
