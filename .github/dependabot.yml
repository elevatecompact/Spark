version: 2

updates:
  # --- Implemented Go services ---
  - package-ecosystem: gomod
    directory: "/services/identity-service"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go

