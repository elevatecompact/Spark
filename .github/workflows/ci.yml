name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io/spark-platform
  GO_VERSION: "1.22"
  GOLANGCI_LINT_VERSION: v1.56

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Lint Go services
        run: |
          for dir in services/identity-service services/creator-service services/stream-service; do
            if [ -f "$dir/go.mod" ]; then
              echo "Linting $dir..."
              (cd "$dir" && golangci-lint run ./... --timeout=10m)
            fi
          done

      - name: Lint Go packages
        run: |
          for dir in packages/*/; do
            if [ -f "$dir/go.mod" ]; then
              echo "Linting $dir..."
              (cd "$dir" && golangci-lint run ./... --timeout=5m)
            fi
          done

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Go tests (services)
        run: |
          for dir in services/identity-service services/creator-service services/stream-service; do
            if [ -f "$dir/go.mod" ]; then
              echo "Testing $dir..."
              (cd "$dir" && go test ./... -coverprofile=coverage.out -covermode=atomic -race -count=1 2>&1 || echo "No tests yet for $dir")
            fi
          done

      - name: Run Go tests (packages)
        run: |
          for dir in packages/*/; do
            if [ -f "$dir/go.mod" ]; then
              echo "Testing $dir..."
              (cd "$dir" && go test ./... -coverprofile=coverage.out -covermode=atomic -race -count=1 2>&1 || echo "No tests yet for $dir")
            fi
          done

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - identity-service
          - creator-service
          - stream-service
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build Go binary
        run: |
          cd services/${{ matrix.service }}
          go build -o ../../dist/${{ matrix.service }} ./cmd/...
          echo "Built ${{ matrix.service }} successfully"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-binary
          path: dist/${{ matrix.service }}
          retention-days: 7

  docker:
    name: Docker Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - identity-service
          - creator-service
          - stream-service
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Run Trivy on config
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config-results.sarif

      - name: Upload Trivy config results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config
