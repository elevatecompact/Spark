name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/**"
      - "infrastructure/**"
      - "deployment/**"
      - "Dockerfile"
      - ".github/workflows/**"

env:
  REGISTRY: ghcr.io/elevatecompact
  GO_VERSION: "1.25"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            identity-service: services/identity-service/**
            creator-service: services/creator-service/**
            stream-service: services/stream-service/**
            infrastructure: infrastructure/** deployment/**

  build:
    name: Build & Push
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
      fail-fast: false
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: [changes, build]
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    environment: staging
    steps:
      - run: |
          echo "Deploying ${{ join(fromJSON(needs.changes.outputs.services), ', ') }} to staging"
          echo "SHA: ${{ github.sha }}"
          echo "Staging deployment would run:"
          for svc in $(echo '${{ needs.changes.outputs.services }}' | jq -r '.[]'); do
            echo "  kubectl set image deployment/$svc $svc=${{ env.REGISTRY }}/$svc:${{ github.sha }}"
          done

  approve-production:
    name: Approve Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    environment: production
    steps:
      - name: Await manual approval
        run: echo "Waiting for manual approval..."

  deploy-production:
    name: Deploy to Production
    needs: approve-production
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    environment: production
    steps:
      - run: |
          echo "Production deployment would run for ${{ join(fromJSON(needs.changes.outputs.services), ', ') }}"
          echo "SHA: ${{ github.sha }}"
